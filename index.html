<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Financial Services Calculator</title>
    <style>
        /* Styling for the red background and golden font */
        body {
            background-color: #8B0000; /* Dark Red background */
            color: gold;               /* Golden font color */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        
        .calculator-container {
            background-color: #A52A2A; /* Slightly different red for the box */
            padding: 30px;
            border: 2px solid gold;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.5);
        }

        /* Headings and text layout */
        h1 {
            margin-bottom: 5px;
            text-align: center;
        }
        
        p.description {
            margin-bottom: 25px;
            font-style: italic;
            text-align: center;
            font-size: 1.1em;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid gold;
            border-radius: 4px;
            background-color: white; 
            color: black;
            font-size: 16px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: gold;
            color: #8B0000; /* Red text on the golden button */
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #FFD700; /* Brighter gold when hovering */
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid gold;
        }
    </style>
</head>
<body>

    <h1>Great Financial Services</h1>
    <p class="description">Calculate your great future with our investment tools.</p>

    <div class="calculator-container">
        <label for="principal">Enter the amount you want to invest:</label>
        <input type="number" id="principal" placeholder="e.g., 5000">

        <label for="years">Enter the Investment duration (Years):</label>
        <input type="number" id="years" placeholder="e.g., 10">

        <label for="rate">Enter the expected rate of interest (%):</label>
        <input type="number" id="rate" placeholder="e.g., 12">

        <button onclick="calculateMaturity()">Calculate</button>

        <div id="result">Maturity Amount: 0.00</div>
    </div>

    <script>
        function calculateMaturity() {
            // Get values from inputs (acts like 'cin' in C++)
            let P = parseFloat(document.getElementById('principal').value);
            let n = parseFloat(document.getElementById('years').value);
            let r = parseFloat(document.getElementById('rate').value);

            // Safety check to ensure all boxes are filled
            if (isNaN(P) || isNaN(n) || isNaN(r)) {
                document.getElementById('result').innerHTML = "Please enter valid numbers.";
                return;
            }

            // The exact logic from your C++ code
            let a = n * 12;
            let i = r / (12 * 100);
            
            // Math.pow replaces pow() from <cmath>
            let T = P * ((Math.pow(1 + i, a) - 1) / i) * (1 + i);

            // Output the result (acts like 'cout') formatted to 2 decimals
            document.getElementById('result').innerHTML = "Maturity Amount: ₹" + T.toFixed(2);
        }
    </script>

</body>
</html>
